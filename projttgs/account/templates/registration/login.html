{% extends "base.html" %}
{% load socialaccount %}
{% block content %}

<div class="login-page">

  <canvas id="stars"></canvas>
  <canvas id="wave-canvas"></canvas>

  <div class="login-blob login-blob-1"></div>
  <div class="login-blob login-blob-2"></div>

  <div class="login-box">
    <div class="login-split">

      <!-- LEFT IMAGE PANEL WITH AUTOTYPE ON IMAGE -->
      <div class="login-left">
        <div class="image-overlay">
          <p class="auto-text"></p>
        </div>
        <img src="https://images.unsplash.com/photo-1484480974693-6ca0a78fb36b?w=900&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8OHx8dGltZSUyMG1hbmFnZW1lbnR8ZW58MHx8MHx8fDA%3D"
             class="side-image"
             alt="AI Illustration">
      </div>

      <!-- RIGHT SIDE FORM -->
      <div class="login-right">

        <h2 class="login-title">Welcome Back 👋</h2>
        <p class="login-subtitle">Log in to manage your timetable smarter.</p>

        {% if form.errors %}
        <div class="error-msg">❌ Invalid username or password</div>
        {% endif %}

        <form action="{% url 'login' %}" method="post" class="form">
          {% csrf_token %}
          <p><label>Username</label>
          <input type="text" name="username" required placeholder="Enter username"></p>

          <p><label>Password</label>
          <input type="password" name="password" required placeholder="Enter password"></p>

          <input type="hidden" name="next" value="{{ next }}">

          <button type="submit" class="btn">Login</button>
        </form>

        <div class="or-divider"><span>or</span></div>

        <a href="{% provider_login_url 'google' %}" class="google-btn">
          <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59a14.5 14.5 0 0 1 0-9.18l-7.98-6.19a24.01 24.01 0 0 0 0 21.56l7.98-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
          Sign in with Google
        </a>

        <div class="links">
          <a href="{% url 'register' %}">Create Account</a> •
          <a href="{% url 'password_reset' %}">Forgot Password?</a>
        </div>

      </div>
    </div>
  </div>
</div>

<style>
html, body { width:100%; overflow-x:hidden !important; }

:root { --accent:#6366f1; --accent2:#ec4899; --muted:#9ca3af; }

/* Page Layout */
.login-page {
  min-height:calc(100vh - 100px);
  display:flex; justify-content:center; align-items:center;
  padding:10px 0 20px 0;
  position:relative;
  font-family:"Poppins",sans-serif;
}

/* Blobs + Stars + Waves same */
.login-blob { position:absolute; border-radius:999px; filter:blur(60px);
  opacity:.62; mix-blend-mode:screen; z-index:0;}
.login-blob-1{width:340px;height:340px;background:#4f46e5;top:-80px;left:-80px;}
.login-blob-2{width:420px;height:420px;background:#ec4899;bottom:-120px;right:-80px;}

#stars,#wave-canvas{position:fixed; inset:0; width:100vw;height:100vh;pointer-events:none;z-index:0;}

/* CARD */
.login-box {
  z-index:2;
  width:100%; max-width:820px;
  border-radius:22px;
  border:1px solid rgba(255,255,255,.2);
  backdrop-filter:blur(14px);
  background:rgba(15,23,42,.55);
  overflow:hidden;
  animation:pop .7s ease forwards; opacity:0; transform:translateY(20px);
}
@keyframes pop {to {opacity:1; transform:translateY(0);}}

/* Split */
.login-split { display:flex; width:100%; }

/* LEFT IMAGE */
.login-left {
  width:45%; position:relative;
}
.side-image {
  width:100%; height:100%; object-fit:cover; display:block;
  border-radius:22px 0 0 22px;
}

/* AUTO TYPE ON IMAGE */
.image-overlay {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  z-index:5; text-align:center;
}
.auto-text {
  font-size: 26px;
  font-weight: 700;
  color: white;          /* main color */
  -webkit-background-clip: unset;
  background: none;
  text-shadow: none;     /* if you don’t want glow */
}


/* FORM SIDE */
.login-right { width:55%; padding:24px 28px; }

.login-title {
  font-size:28px; font-weight:700;
  background:linear-gradient(120deg,#fff,#d5d9ff,#ffc3e8);
  -webkit-background-clip:text; color:transparent;
}
.login-subtitle { font-size:14px; color:var(--muted); margin-bottom:12px; }

/* FORM */
.form p { margin-bottom:10px; text-align:left; font-size:13px; color:var(--muted); }
.form label { margin-bottom:3px; display:block; }
.form input {
  width:100%; padding:10px 12px;
  border-radius:10px; font-size:14px; color:white;
  background:rgba(15,23,42,.9);
  border:1px solid rgba(148,163,184,.45);
}

/* BUTTON */
.btn {
  width:100%; padding:11px; border-radius:999px;
  border:none; font-size:16px; font-weight:700;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  cursor:pointer; color:white;
}
.btn:hover { transform:translateY(-2px); }

/* OR DIVIDER */
.or-divider {
  display:flex; align-items:center; gap:12px;
  margin:12px 0 10px;
  color:var(--muted); font-size:13px;
}
.or-divider::before, .or-divider::after {
  content:""; flex:1; height:1px;
  background:rgba(148,163,184,.35);
}

/* GOOGLE BUTTON */
.google-btn {
  display:flex; align-items:center; justify-content:center; gap:10px;
  width:100%; padding:10px; border-radius:999px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(148,163,184,.35);
  color:white; font-size:15px; font-weight:600;
  text-decoration:none; cursor:pointer;
  transition: background .2s;
}
.google-btn:hover { background:rgba(255,255,255,.15); }

/* LINKS */
.links { margin-top:12px; font-size:13px; text-align:center; color:var(--muted);}
.links a {color:#a5b4fc; font-weight:600; }

/* RESPONSIVE */
@media(max-width:768px){
  .login-split { flex-direction:column; }
  .login-left { width:100%; height:230px; }
  .side-image { border-radius:22px 22px 0 0; }
  .login-right { width:100%; padding:22px; }
  .auto-text { font-size:20px; }
  .login-title { font-size:28px; }
}
</style>

<!-- AUTO-TYPE -->
<script>
const messages=["Automate your college ","Adopt SmartScheduler ","Choose Smart ✨"];
let i=0,j=0,speed=70;
const el=document.querySelector(".auto-text");
function type(){
  if(j < messages[i].length){
    el.innerHTML += messages[i][j++];
    setTimeout(type,speed);
  } else setTimeout(erase,1200);
}
function erase(){
  if(j>0){
    el.innerHTML = messages[i].substring(0,--j);
    setTimeout(erase,40);
  } else {i=(i+1)%messages.length; setTimeout(type,300);}
}
type();
</script>

<!-- FLOATING STARS -->
<script>
const s=document.getElementById("stars"),ctx=s.getContext("2d");
function resize(){s.width=innerWidth; s.height=innerHeight} resize(); addEventListener("resize",resize);
class Star{constructor(){
this.x=Math.random()*s.width;this.y=Math.random()*s.height;
this.size=Math.random()*1.8+.6;this.sx=Math.random()*.08-.04;this.sy=Math.random()*.08-.04;}
move(){this.x+=this.sx;this.y+=this.sy;}
draw(){ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,2*Math.PI);
ctx.fillStyle="rgba(255,255,255,.85)";ctx.shadowBlur=8;ctx.fill();}}
let stars=[];for(let k=0;k<120;k++)stars.push(new Star());
function anim(){ctx.clearRect(0,0,s.width,s.height);stars.forEach(s=>{s.move();s.draw();});requestAnimationFrame(anim);} anim();
</script>

{% endblock %}
