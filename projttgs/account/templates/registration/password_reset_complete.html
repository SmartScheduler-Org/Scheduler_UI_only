{% extends "base.html" %}
{% block title %}Password Reset Complete • SmartScheduler{% endblock %}
{% block content %}
<canvas id="fpcv"></canvas>
<div class="fpwrap">
  <div class="fpo fpo1"></div><div class="fpo fpo2"></div>
  <div class="fpgrid"></div>
  <div class="fpbox" id="fpbox">
    <div class="fpbord"></div>
    <div class="fpsparks" id="fpsparks"></div>

    <div class="fpinner">
      <div class="fp-icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="url(#cmpig)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="38" height="38">
          <defs><linearGradient id="cmpig" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#22c55e"/><stop offset="100%" stop-color="#00e5ff"/></linearGradient></defs>
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          <path d="m9 12 2 2 4-4"/>
        </svg>
      </div>

      <div class="fp-badge"><span class="fp-dot"></span>All Set</div>
      <h2 class="fp-title">Password Updated!</h2>
      <p class="fp-sub">
        Your password has been reset successfully.<br>
        You can now sign in with your new password.
      </p>

      <a href="{% url 'login' %}" class="fp-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="15" height="15"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        <span>Sign In Now</span>
      </a>
    </div>
  </div>
</div>

<style>
*{box-sizing:border-box}html,body{width:100%;overflow-x:hidden}
#fpcv{position:fixed;inset:0;width:100vw;height:100vh;pointer-events:none;z-index:0}
.fpwrap{min-height:calc(100vh - 60px);display:flex;align-items:center;justify-content:center;padding:18px 14px;position:relative;font-family:'Poppins',sans-serif}
.fpo{position:fixed;border-radius:50%;filter:blur(92px);pointer-events:none;z-index:0}
.fpo1{width:460px;height:460px;background:radial-gradient(circle,rgba(34,197,94,.3),transparent 70%);top:-80px;left:-80px;animation:FPOA 17s ease-in-out infinite alternate}
.fpo2{width:500px;height:500px;background:radial-gradient(circle,rgba(0,229,255,.25),transparent 70%);bottom:-120px;right:-90px;animation:FPOA 21s ease-in-out infinite alternate-reverse}
@keyframes FPOA{to{transform:translate(50px,40px) scale(1.14)}}
.fpgrid{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(0,200,255,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(0,200,255,.05) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 30%,transparent 100%)}
.fpbox{position:relative;z-index:10;width:100%;max-width:420px;border-radius:28px;overflow:hidden;background:rgba(4,8,24,.78);border:1px solid rgba(255,255,255,.1);backdrop-filter:blur(32px);box-shadow:0 32px 80px rgba(0,0,0,.55);animation:FPBIN 1s cubic-bezier(.22,1,.36,1) both;opacity:0;transform:translateY(52px) rotateX(7deg)}
@keyframes FPBIN{to{opacity:1;transform:translateY(0) rotateX(0)}}
.fpbord{position:absolute;inset:-1px;border-radius:29px;z-index:0;pointer-events:none;background:conic-gradient(from var(--fpa,0deg),#22c55e,#00e5ff,#6366f1,#22c55e);opacity:.38;filter:blur(4px);animation:FPBSP 7s linear infinite;-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;padding:1.5px}
@property --fpa{syntax:'<angle>';initial-value:0deg;inherits:false}@keyframes FPBSP{to{--fpa:360deg}}
.fpsparks{position:absolute;inset:0;pointer-events:none;z-index:0;overflow:hidden;border-radius:28px}
.fpsp{position:absolute;border-radius:50%;animation:FPSPU linear infinite;opacity:0}
@keyframes FPSPU{0%{transform:translateY(100%) scale(0);opacity:0}10%{opacity:.7}90%{opacity:.2}100%{transform:translateY(-120%) scale(1);opacity:0}}
.fpinner{position:relative;z-index:1;padding:2.8rem 2.8rem;display:flex;flex-direction:column;align-items:center;text-align:center}
.fp-icon-wrap{width:80px;height:80px;border-radius:20px;background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.3);display:grid;place-items:center;margin-bottom:1.1rem;animation:FPIW 2.5s ease-in-out infinite alternate}
@keyframes FPIW{from{filter:drop-shadow(0 0 12px rgba(34,197,94,.3))}to{filter:drop-shadow(0 0 30px rgba(34,197,94,.6))}}
.fp-badge{display:inline-flex;align-items:center;gap:.4rem;font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#22c55e;padding:.25rem .7rem;border:1px solid rgba(34,197,94,.3);border-radius:20px;background:rgba(34,197,94,.1);margin-bottom:.85rem}
.fp-dot{width:6px;height:6px;border-radius:50%;background:#22c55e;animation:FPDOT 2s infinite}
@keyframes FPDOT{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.65)}50%{box-shadow:0 0 0 7px rgba(34,197,94,0)}}
.fp-title{font-size:1.72rem;font-weight:800;letter-spacing:-.04em;background:linear-gradient(120deg,#fff 20%,#22c55e 55%,#00e5ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.4rem}
.fp-sub{font-size:.83rem;color:rgba(148,163,184,.72);margin-bottom:1.8rem;line-height:1.6}
.fp-btn{width:100%;padding:.9rem;border-radius:14px;border:none;font-size:.93rem;font-weight:700;font-family:'Poppins',sans-serif;cursor:pointer;color:#fff;background:linear-gradient(135deg,#22c55e,#00e5ff 50%,#6366f1);background-size:200%;animation:FPBTN 4s ease infinite;display:flex;align-items:center;justify-content:center;gap:.55rem;transition:transform .2s,box-shadow .2s;text-decoration:none}
.fp-btn:hover{transform:translateY(-2px);box-shadow:0 12px 36px rgba(34,197,94,.4)}
@keyframes FPBTN{0%,100%{background-position:0%}50%{background-position:100%}}
</style>

<script>
const fpcv=document.getElementById('fpcv'),fpcx=fpcv.getContext('2d');
function fprsz(){fpcv.width=innerWidth;fpcv.height=innerHeight;}window.addEventListener('resize',fprsz);fprsz();
const FPCC=['34,197,94','0,229,255','16,217,126','0,200,255','99,102,241'];
class FPCP{constructor(){this.rst(true);}rst(i){this.x=Math.random()*fpcv.width;this.y=i?Math.random()*fpcv.height:fpcv.height+5;this.vx=(Math.random()-.5)*.3;this.vy=-(Math.random()*.45+.1);this.r=Math.random()*1.6+.4;this.life=1;this.dc=Math.random()*.004+.001;this.c=FPCC[Math.floor(Math.random()*FPCC.length)];}upd(){this.x+=this.vx;this.y+=this.vy;this.life-=this.dc;if(this.life<=0)this.rst();}drw(){fpcx.beginPath();fpcx.arc(this.x,this.y,this.r,0,Math.PI*2);fpcx.fillStyle=`rgba(${this.c},${this.life*.7})`;fpcx.shadowBlur=9;fpcx.shadowColor=`rgba(${this.c},.5)`;fpcx.fill();fpcx.shadowBlur=0;}}
const fppts=Array.from({length:65},()=>new FPCP());
function fpAnm(){fpcx.clearRect(0,0,fpcv.width,fpcv.height);fppts.forEach(p=>{p.upd();p.drw();});requestAnimationFrame(fpAnm);}fpAnm();
const fpbox=document.getElementById('fpbox');
document.addEventListener('mousemove',e=>{const r=fpbox.getBoundingClientRect();const cx=(e.clientX-r.left)/r.width-.5,cy=(e.clientY-r.top)/r.height-.5;fpbox.style.transform=`perspective(1200px) rotateY(${cx*9}deg) rotateX(${-cy*6}deg)`;});
document.addEventListener('mouseleave',()=>{fpbox.style.transform='perspective(1200px) rotateY(0) rotateX(0)';});
const fpsc=document.getElementById('fpsparks');
for(let i=0;i<18;i++){const el=document.createElement('div');el.className='fpsp';const sz=Math.random()*3.5+1.5;const cl=['#22c55e','#00e5ff','#10d97e','#22d3ee','#6366f1'];Object.assign(el.style,{width:sz+'px',height:sz+'px',left:Math.random()*100+'%',background:cl[Math.floor(Math.random()*cl.length)],animationDuration:(Math.random()*7+4)+'s',animationDelay:(Math.random()*7)+'s',boxShadow:`0 0 ${sz*3}px currentColor`});fpsc.appendChild(el);}
// Confetti burst on load
(function(){const c=fpcv,cx=fpcx;let burst=60;const particles=Array.from({length:burst},()=>({x:c.width/2,y:c.height/2,vx:(Math.random()-0.5)*8,vy:(Math.random()-0.5)*8-4,r:Math.random()*4+2,life:1,c:['#22c55e','#00e5ff','#6366f1','#ec4899','#f97316'][Math.floor(Math.random()*5)]}));let frame=0;function burst_anim(){if(frame++>60)return;particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.life-=0.016;cx.globalAlpha=p.life;cx.beginPath();cx.arc(p.x,p.y,p.r,0,Math.PI*2);cx.fillStyle=p.c;cx.fill();cx.globalAlpha=1;});requestAnimationFrame(burst_anim);}setTimeout(burst_anim,400);})();
</script>
{% endblock %}
