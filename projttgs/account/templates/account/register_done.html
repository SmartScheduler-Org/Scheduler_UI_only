{% extends "base.html" %}
{% block title %}Account Created • SmartScheduler{% endblock %}
{% block content %}

<div class="welcome-wrapper">

  <div class="welcome-card animate-pop">
    
    <div class="check-icon">✔</div>

    <h1 class="welcome-title">Welcome, {{ new_user.first_name }}! 🎉</h1>

    <p class="welcome-sub">
      Your account has been successfully created.<br>
      You can now log in to access SmartScheduler.
    </p>

    <a href="{% url 'login' %}" class="welcome-btn">Login Now</a>
  </div>
</div>

<style>
.welcome-wrapper {
  min-height: calc(100vh - 80px);
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.welcome-card {
  background: rgba(15, 23, 42, 0.92);
  padding: 40px 34px;
  border-radius: 22px;
  text-align: center;
  color: #fff;
  border: 1px solid rgba(148,163,184,0.4);
  backdrop-filter: blur(14px);
  max-width: 480px;
  width: 100%;
  box-shadow:
    0 0 30px rgba(99,102,241,0.45),
    0 0 50px rgba(236,72,153,0.35);
  transform: translateY(20px) scale(0.95);
  opacity: 0;
  animation: pop 0.7s ease forwards;
}

@keyframes pop {
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

.check-icon {
  font-size: 50px;
  margin-bottom: 18px;
  color: #4ade80;
  text-shadow: 0 0 18px rgba(34,197,94,0.7);
}

.welcome-title {
  font-size: 28px;
  margin-bottom: 10px;
  font-weight: 600;
  background: linear-gradient(120deg,#fff,#a5b4fc,#f9a8d4);
  -webkit-background-clip: text;
  color: transparent;
}

.welcome-sub {
  font-size: 15px;
  color: #c3c8d6;
  margin-bottom: 22px;
  line-height: 1.6;
}

.welcome-btn {
  display: inline-block;
  padding: 13px 24px;
  border-radius: 999px;
  font-weight: 600;
  font-size: 15px;
  color: #fff;
  text-decoration: none;
  background: linear-gradient(135deg,#6366f1,#ec4899);
  box-shadow: 0 10px 26px rgba(99,102,241,0.55);
  transition: 0.25s ease;
}

.welcome-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 14px 36px rgba(99,102,241,0.75);
}

/* MOBILE */
@media(max-width:520px){
  .welcome-card { padding: 28px 20px; }
  .welcome-title { font-size: 24px; }
}
</style>

{% endblock %}
