{% extends "base.html" %}
{% block content %}

<div class="locked-page">
  <div class="locked-card">
    <div class="locked-icon">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
    <h2 class="locked-title">Role Already Assigned</h2>
    <p class="locked-msg">
      Your account is registered as <strong>{{ current_role }}</strong>.
      You cannot access another role with the same account.
    </p>
    <a href="{% url 'role' %}" class="locked-btn">Go Back</a>
  </div>
</div>

<style>
.locked-page {
  min-height: calc(100vh - 120px);
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 40px 20px;
}

.locked-card {
  max-width: 440px;
  width: 100%;
  text-align: center;
  background: rgba(15,23,42,0.7);
  border: 1px solid rgba(248,113,113,0.3);
  border-radius: 20px;
  padding: 40px 32px;
  backdrop-filter: blur(14px);
}

.locked-icon { margin-bottom: 20px; }

.locked-title {
  font-size: 24px;
  font-weight: 700;
  color: #f87171;
  margin-bottom: 12px;
}

.locked-msg {
  font-size: 15px;
  color: #9ca3af;
  line-height: 1.6;
  margin-bottom: 24px;
}

.locked-msg strong { color: #e2e8f0; }

.locked-btn {
  display: inline-block;
  padding: 10px 28px;
  border-radius: 999px;
  background: linear-gradient(135deg, #6366f1, #ec4899);
  color: white;
  font-weight: 600;
  font-size: 14px;
  text-decoration: none;
  transition: transform 0.2s;
}

.locked-btn:hover { transform: translateY(-2px); }
</style>

{% endblock %}
