<style>
.wf-progress-wrap {
    width: min(100%, 1080px);
    margin: 14px auto 4px;
    padding: 0 8px;
}

.wf-progress-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0;
    padding: 8px 4px;
    overflow-x: auto;
}

.wf-step-item {
    display: flex;
    align-items: center;
    flex: 1 1 0;
    min-width: 60px;
}

.wf-step-link {
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
}

.wf-step-dot {
    width: 38px;
    height: 38px;
    border-radius: 999px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    font-weight: 700;
    color: rgba(226,232,240,0.92);
    background: rgba(148,163,184,0.12);
    border: 2px solid rgba(226,232,240,0.3);
    transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease, background 0.25s ease;
}

.wf-step-item.is-complete .wf-step-dot {
    background: rgba(148,163,184,0.18);
    border-color: rgba(226,232,240,0.36);
    color: #f8fafc;
}

.wf-step-item.is-active .wf-step-dot {
    background: linear-gradient(135deg, #38bdf8, #2563eb 58%, #7c3aed);
    border-color: rgba(191,219,254,0.95);
    color: white;
    box-shadow: 0 0 0 6px rgba(59,130,246,0.1), 0 0 22px rgba(59,130,246,0.32);
    transform: scale(1.04);
}

.wf-connector {
    flex: 1 1 auto;
    height: 2px;
    margin: 0 8px;
    min-width: 16px;
    background: linear-gradient(90deg, rgba(148,163,184,0.3), rgba(148,163,184,0.12));
}

.wf-step-item.is-complete .wf-connector,
.wf-step-item.is-active .wf-connector {
    background: linear-gradient(90deg, rgba(56,189,248,0.7), rgba(37,99,235,0.5));
}

@media (max-width: 680px) {
    .wf-progress-wrap {
        margin-top: 10px;
    }

    .wf-progress-bar {
        justify-content: flex-start;
        min-width: 520px;
    }
}
</style>

<div class="wf-progress-wrap">
    <div class="wf-progress-bar" aria-label="Setup progress">
        <div class="wf-step-item {% if current_step == 1 %}is-active{% endif %} {% if current_step > 1 %}is-complete{% endif %}">
            <a href="{% url 'addDepts' %}" class="wf-step-link" aria-label="Step 1: Add Departments">
                <span class="wf-step-dot">1</span>
            </a>
            <span class="wf-connector"></span>
        </div>
        <div class="wf-step-item {% if current_step == 2 %}is-active{% endif %} {% if current_step > 2 %}is-complete{% endif %}">
            <a href="{% url 'addInstructors' %}" class="wf-step-link" aria-label="Step 2: Add Teachers">
                <span class="wf-step-dot">2</span>
            </a>
            <span class="wf-connector"></span>
        </div>
        <div class="wf-step-item {% if current_step == 3 %}is-active{% endif %} {% if current_step > 3 %}is-complete{% endif %}">
            <a href="{% url 'addRooms' %}" class="wf-step-link" aria-label="Step 3: Add Rooms">
                <span class="wf-step-dot">3</span>
            </a>
            <span class="wf-connector"></span>
        </div>
        <div class="wf-step-item {% if current_step == 4 %}is-active{% endif %} {% if current_step > 4 %}is-complete{% endif %}">
            <a href="{% url 'addTimings' %}" class="wf-step-link" aria-label="Step 4: Add Timings">
                <span class="wf-step-dot">4</span>
            </a>
            <span class="wf-connector"></span>
        </div>
        <div class="wf-step-item {% if current_step == 5 %}is-active{% endif %} {% if current_step > 5 %}is-complete{% endif %}">
            <a href="{% url 'addCourses' %}" class="wf-step-link" aria-label="Step 5: Add Courses">
                <span class="wf-step-dot">5</span>
            </a>
            <span class="wf-connector"></span>
        </div>
        <div class="wf-step-item {% if current_step == 6 %}is-active{% endif %} {% if current_step > 6 %}is-complete{% endif %}">
            <a href="{% url 'map_teacher_courses' %}" class="wf-step-link" aria-label="Step 6: Map Teachers to Subjects">
                <span class="wf-step-dot">6</span>
            </a>
            <span class="wf-connector"></span>
        </div>
        <div class="wf-step-item {% if current_step == 7 %}is-active{% endif %} {% if current_step > 7 %}is-complete{% endif %}">
            <a href="{% url 'addSections' %}" class="wf-step-link" aria-label="Step 7: Add Sections">
                <span class="wf-step-dot">7</span>
            </a>
            <span class="wf-connector"></span>
        </div>
        <div class="wf-step-item {% if current_step == 8 %}is-active{% endif %} {% if current_step > 8 %}is-complete{% endif %}" style="flex: 0 0 auto; min-width: auto;">
            <a href="{% url 'map_section_courses' %}" class="wf-step-link" aria-label="Step 8: Map Subjects">
                <span class="wf-step-dot">8</span>
            </a>
        </div>
    </div>
</div>
