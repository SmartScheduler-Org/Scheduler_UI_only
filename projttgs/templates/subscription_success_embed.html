<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Subscription Activated</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: linear-gradient(180deg, #08111f 0%, #0f172a 100%);
            color: #f8fafc;
            font-family: "Poppins", sans-serif;
        }
        .card {
            width: min(420px, calc(100% - 32px));
            padding: 28px;
            border-radius: 24px;
            background: rgba(15, 23, 42, 0.92);
            border: 1px solid rgba(148, 163, 184, 0.22);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
            text-align: center;
        }
        .badge {
            width: 58px;
            height: 58px;
            margin: 0 auto 16px;
            border-radius: 999px;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, #22c55e, #14b8a6);
            font-size: 28px;
        }
        h1 {
            margin: 0 0 10px;
            font-size: 28px;
        }
        p {
            margin: 0;
            color: rgba(226, 232, 240, 0.82);
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="badge">✓</div>
        <h1>Subscription Active</h1>
        <p>Create Timetable is now unlocked. This popup will close automatically.</p>
    </div>
    <script>
        (function () {
            try {
                if (window.top && window.top !== window) {
                    window.top.postMessage({ type: "subscription-complete" }, window.location.origin);
                }
            } catch (error) {}
        })();
    </script>
</body>
</html>
