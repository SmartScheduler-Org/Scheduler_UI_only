{% extends "base.html" %}
{% block content %}

<div class="role-page">
  <canvas id="stars"></canvas>

  <div class="role-blob role-blob-1"></div>
  <div class="role-blob role-blob-2"></div>
  <div class="role-blob role-blob-3"></div>

  <div class="role-content">
    <h1 class="role-heading">Choose Your Role</h1>
    <p class="role-sub">Select how you'd like to access SmartScheduler</p>

    <div class="role-grid">

      <!-- HOD -->
      <a href="{% url 'set_role_hod' %}" class="role-card">
        <div class="role-icon" style="--glow:#6366f1;">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
            <path d="M2 17l10 5 10-5"/>
            <path d="M2 12l10 5 10-5"/>
          </svg>
        </div>
        <h3 class="role-name">HOD</h3>
        <p class="role-desc">Manage departments, create & generate timetables</p>
      </a>

      <!-- TEACHER -->
      <a href="{% url 'set_role_teacher' %}" class="role-card">
        <div class="role-icon" style="--glow:#ec4899;">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
        </div>
        <h3 class="role-name">Teacher</h3>
        <p class="role-desc">View your assigned classes & daily schedule</p>
      </a>

      <!-- DEAN -->
      <a href="{% url 'set_role_dean' %}" class="role-card">
        <div class="role-icon" style="--glow:#10b981;">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
            <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
          </svg>
        </div>
        <h3 class="role-name">Dean</h3>
        <p class="role-desc">Oversee all timetables & academic scheduling</p>
      </a>

    </div>
  </div>
</div>

<style>
.role-page {
  min-height: calc(100vh - 80px);
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
  overflow: hidden;
  padding: 40px 20px;
}

#stars { position:fixed; inset:0; width:100vw; height:100vh; pointer-events:none; z-index:0; }

.role-blob {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.45;
  z-index: 0;
  animation: blobFloat 10s ease-in-out infinite;
}
.role-blob-1 { width:350px; height:350px; background:#6366f1; top:-60px; left:-40px; }
.role-blob-2 { width:400px; height:400px; background:#ec4899; bottom:-80px; right:-60px; animation-delay:3s; }
.role-blob-3 { width:300px; height:300px; background:#10b981; top:50%; left:50%; transform:translate(-50%,-50%); animation-delay:6s; }

@keyframes blobFloat {
  0%,100% { transform: translateY(0) scale(1); }
  50% { transform: translateY(-30px) scale(1.08); }
}

.role-content {
  position: relative;
  z-index: 2;
  text-align: center;
  max-width: 900px;
  width: 100%;
}

.role-heading {
  font-size: 42px;
  font-weight: 800;
  margin-bottom: 8px;
  background: linear-gradient(135deg, #fff 0%, #c7d2fe 50%, #f9a8d4 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: -0.5px;
}

.role-sub {
  font-size: 16px;
  color: #9ca3af;
  margin-bottom: 48px;
}

.role-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
}

.role-card {
  background: rgba(15,23,42,0.7);
  border: 1px solid rgba(148,163,184,0.15);
  border-radius: 20px;
  padding: 36px 24px 28px;
  text-decoration: none;
  color: #fff;
  backdrop-filter: blur(16px);
  transition: all 0.3s ease;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
}

.role-card:hover {
  transform: translateY(-8px);
  border-color: rgba(148,163,184,0.35);
  box-shadow: 0 20px 40px rgba(0,0,0,0.3), 0 0 30px rgba(99,102,241,0.15);
}

.role-icon {
  width: 72px;
  height: 72px;
  border-radius: 18px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 20px;
  color: var(--glow);
  transition: all 0.3s ease;
}

.role-card:hover .role-icon {
  background: rgba(255,255,255,0.08);
  box-shadow: 0 0 20px color-mix(in srgb, var(--glow) 30%, transparent);
}

.role-name {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 8px;
}

.role-desc {
  font-size: 14px;
  color: #9ca3af;
  line-height: 1.5;
  margin: 0;
}

@media(max-width:768px) {
  .role-grid { grid-template-columns: 1fr; max-width: 340px; margin: 0 auto; }
  .role-heading { font-size: 32px; }
  .role-card { padding: 28px 20px 22px; }
}

@media(min-width:769px) and (max-width:960px) {
  .role-grid { grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .role-card { padding: 28px 16px 22px; }
}
</style>

<script>
const s=document.getElementById("stars"),ctx=s.getContext("2d");
function resize(){s.width=innerWidth;s.height=innerHeight} resize(); addEventListener("resize",resize);
class Star{constructor(){
this.x=Math.random()*s.width;this.y=Math.random()*s.height;
this.size=Math.random()*1.8+.6;this.sx=Math.random()*.08-.04;this.sy=Math.random()*.08-.04;}
move(){this.x+=this.sx;this.y+=this.sy;}
draw(){ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,2*Math.PI);
ctx.fillStyle="rgba(255,255,255,.85)";ctx.shadowBlur=8;ctx.fill();}}
let stars=[];for(let k=0;k<120;k++)stars.push(new Star());
function anim(){ctx.clearRect(0,0,s.width,s.height);stars.forEach(s=>{s.move();s.draw();});requestAnimationFrame(anim);} anim();
</script>

{% endblock %}
