<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #0f172a; margin: 0; padding: 0; }
    .wrapper { max-width: 580px; margin: 32px auto; background: #1e293b; border-radius: 16px; overflow: hidden; border: 1px solid rgba(99,102,241,0.25); }
    .header { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); padding: 32px 36px; }
    .header h1 { color: #fff; margin: 0; font-size: 22px; font-weight: 700; letter-spacing: 0.3px; }
    .header p { color: rgba(255,255,255,0.75); margin: 6px 0 0; font-size: 13px; }
    .badge { display: inline-block; background: rgba(255,255,255,0.18); color: #fff; font-size: 12px; font-weight: 600; padding: 3px 12px; border-radius: 20px; margin-top: 10px; letter-spacing: 0.5px; }
    .body { padding: 28px 36px; }
    .field { margin-bottom: 20px; }
    .label { font-size: 11px; font-weight: 700; color: #6366f1; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
    .value { font-size: 15px; color: #e2e8f0; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 10px 14px; word-break: break-word; }
    .message-value { font-size: 14px; color: #cbd5e1; line-height: 1.7; white-space: pre-wrap; }
    .divider { height: 1px; background: rgba(255,255,255,0.07); margin: 8px 0 24px; }
    .footer { background: #0f172a; padding: 18px 36px; text-align: center; font-size: 12px; color: #475569; }
    .footer a { color: #6366f1; text-decoration: none; }
    .reply-btn { display: inline-block; margin-top: 20px; background: #4f46e5; color: #fff; text-decoration: none; padding: 11px 28px; border-radius: 8px; font-size: 14px; font-weight: 600; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="header">
      <h1>New Contact Message</h1>
      <p>Someone reached out via SmartScheduler Contact Form</p>
      <span class="badge">{{ topic }}</span>
    </div>
    <div class="body">
      <div class="field">
        <div class="label">Full Name</div>
        <div class="value">{{ name }}</div>
      </div>
      <div class="field">
        <div class="label">Email Address</div>
        <div class="value">{{ email }}</div>
      </div>
      <div class="field">
        <div class="label">Institution</div>
        <div class="value">{{ institution }}</div>
      </div>
      <div class="divider"></div>
      <div class="field">
        <div class="label">Message</div>
        <div class="value message-value">{{ message }}</div>
      </div>
      <a href="mailto:{{ email }}?subject=Re: Your SmartScheduler Inquiry" class="reply-btn">Reply to {{ name }}</a>
    </div>
    <div class="footer">
      Sent from <a href="#">SmartScheduler</a> Contact Form &nbsp;·&nbsp; Do not reply to this email directly
    </div>
  </div>
</body>
</html>
