{% extends "base.html" %}
{% load static %}
{% block title %}Application sent | SmartScheduler{% endblock %}

{% block content %}
<style>
  .thanks-page {
    min-height: 58vh;
    display: grid;
    place-items: center;
    padding: 64px 20px 96px;
    color: #e2e8f0;
    font-family: "Poppins", sans-serif;
  }

  .thanks-card {
    width: min(100%, 640px);
    text-align: center;
    padding: 44px 34px;
    border-radius: 24px;
    border: 1px solid rgba(148, 163, 184, 0.24);
    background:
      radial-gradient(circle at top, rgba(34, 197, 94, 0.14), transparent 36%),
      rgba(7, 18, 37, 0.86);
    box-shadow: 0 24px 70px rgba(2, 6, 23, 0.52);
    backdrop-filter: blur(16px);
  }

  .thanks-icon {
    width: 58px;
    height: 58px;
    margin: 0 auto 18px;
    border-radius: 18px;
    display: grid;
    place-items: center;
    color: #06111f;
    background: linear-gradient(135deg, #38bdf8, #22c55e);
    box-shadow: 0 0 34px rgba(34, 197, 94, 0.32);
  }

  .thanks-card h1 {
    margin: 0 0 12px;
    font-size: clamp(28px, 5vw, 44px);
    line-height: 1.1;
  }

  .thanks-card p {
    margin: 0 0 26px;
    color: #94a3b8;
    line-height: 1.7;
  }

  .go-home-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 44px;
    padding: 11px 20px;
    border-radius: 999px;
    color: #fff;
    background: linear-gradient(135deg, #6366f1, #ec4899);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    box-shadow: 0 16px 38px rgba(99, 102, 241, 0.42);
  }
</style>

<section class="thanks-page">
  <div class="thanks-card">
    <div class="thanks-icon">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <h1>We will reach out to you very soon</h1>
    <p>Your institute customization application has been sent to the SmartScheduler team.</p>
    <a class="go-home-btn" href="{% url 'home' %}">Go back</a>
  </div>
</section>
{% endblock content %}
