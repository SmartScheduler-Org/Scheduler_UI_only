{% load static %}
<!DOCTYPE html>
<html lang="en">
<script>if(localStorage.getItem('theme')==='light')document.documentElement.classList.add('light');</script>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Home{% endblock %}</title>
   <link rel="stylesheet" href="{% static 'navbar.css' %}">
 <link rel="stylesheet" href="{% static 'base.css' %}"> 
    <link rel="stylesheet" href="{% static 'homepage.css' %}"> 
    <link rel="preload" href="{% static 'all_add_pageCSS.css' %}" as="style">
<link rel="stylesheet" href="{% static 'all_add_pageCSS.css' %}">
     <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


    <!-- tab icon -->
     <link rel="icon" type="image/png" href="{% static 'logo.png' %}">
    <link rel="shortcut icon" type="image/png" href="{% static 'logo.png' %}">



    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Asset&family=Notable&display=swap" rel="stylesheet">

</head>

<body class="site-layout">
    <canvas id="neuron-canvas"></canvas>
    {% include 'navbarmain.html' %} 
    <div id="pageLoadIndicator" class="page-load-indicator" aria-hidden="true">
      <div class="page-load-pill">
        <div class="page-load-spinner">
          <div class="page-load-logo">
            <img src="{% static 'logo.png' %}" alt="SmartScheduler" style="width:26px;height:30px;object-fit:contain;display:block;"/>
          </div>
        </div>
        <span class="page-load-text">Loading SmartScheduler...</span>
      </div>
    </div>
     <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    {% block workflow_progress %}{% endblock %}

    <main class="container page-shell">
        {% block content %}
        
        {% endblock %}
    </main>

     {% include 'mainfotter.html' %}
    <script src="{% static 'chatbot.js' %}"></script>
    <script src="{% static 'neuron_bg.js' %}"></script>
    <style>
      .page-load-indicator {
        position: fixed;
        top: 16px;
        left: 50%;
        transform: translateX(-50%) translateY(-16px);
        opacity: 0;
        pointer-events: none;
        z-index: 1000000;
        transition: opacity 0.22s ease, transform 0.22s ease;
      }

      .page-load-indicator.is-visible {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }

      .page-load-pill {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        padding: 10px 16px 10px 12px;
        border-radius: 999px;
        border: 1px solid rgba(148, 163, 184, 0.28);
        background: rgba(7, 15, 32, 0.9);
        box-shadow: 0 16px 40px rgba(2, 6, 23, 0.42);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }

      .page-load-spinner {
        position: relative;
        width: 34px;
        height: 34px;
        border-radius: 50%;
        display: grid;
        place-items: center;
      }

      .page-load-spinner::before {
        content: "";
        position: absolute;
        inset: -4px;
        border-radius: 50%;
        border: 2.5px solid rgba(56, 189, 248, 0.2);
        border-top-color: #38bdf8;
        border-right-color: #22c55e;
        animation: pageLoadSpin 0.85s linear infinite;
        box-shadow: 0 0 18px rgba(14, 165, 233, 0.32);
      }

      .page-load-logo {
        width: 26px;
        height: 30px;
        display: grid;
        place-items: center;
      }

      .page-load-logo svg {
        width: 100%;
        height: 100%;
        display: block;
      }

      .page-load-text {
        color: #e2e8f0;
        font-size: 13px;
        font-weight: 600;
        white-space: nowrap;
      }

      @keyframes pageLoadSpin {
        to {
          transform: rotate(360deg);
        }
      }

      @media (max-width: 640px) {
        .page-load-indicator {
          top: 12px;
        }

        .page-load-pill {
          padding: 9px 12px 9px 10px;
          gap: 10px;
        }

        .page-load-text {
          font-size: 12px;
        }
      }
    </style>
    <script>
      (function () {
        const pageShell = document.querySelector(".page-shell");
        const stickyFooter = document.querySelector(".site-footer-ref, .footer, .footer-new");
        function enforceStickyFooterLayout() {
          if (!pageShell || !stickyFooter) return;
          document.body.style.display = "flex";
          document.body.style.flexDirection = "column";
          document.body.style.minHeight = "100vh";
          document.body.style.minHeight = "100svh";
          pageShell.style.flex = "1 0 auto";
          pageShell.style.width = "100%";
          stickyFooter.style.marginTop = "auto";
        }

        const loader = document.getElementById("pageLoadIndicator");
        enforceStickyFooterLayout();
        window.addEventListener("resize", enforceStickyFooterLayout);
        if (!loader) return;

        let showTimer = null;

        function showPageLoader() {
          if (showTimer) {
            window.clearTimeout(showTimer);
          }
          showTimer = window.setTimeout(() => {
            loader.classList.add("is-visible");
            loader.setAttribute("aria-hidden", "false");
          }, 120);
        }

        function hidePageLoader() {
          if (showTimer) {
            window.clearTimeout(showTimer);
            showTimer = null;
          }
          loader.classList.remove("is-visible");
          loader.setAttribute("aria-hidden", "true");
        }

        function shouldSkipLoaderForLink(link) {
          const href = (link.getAttribute("href") || "").trim();
          if (!href || href === "#" || href.startsWith("#")) return true;
          if (href.startsWith("javascript:")) return true;
          if (link.hasAttribute("download")) return true;
          if (link.target && link.target.toLowerCase() === "_blank") return true;
          if (link.dataset.noPageLoader === "true") return true;
          return false;
        }

        document.addEventListener("click", (event) => {
          const link = event.target.closest("a[href]");
          if (!link) return;
          if (event.defaultPrevented) return;
          if (event.metaKey || event.ctrlKey || event.shiftKey || event.altKey) return;
          if (shouldSkipLoaderForLink(link)) return;
          showPageLoader();
        });

        document.addEventListener("submit", (event) => {
          const form = event.target;
          if (!(form instanceof HTMLFormElement)) return;
          if (event.defaultPrevented) return;
          if (form.dataset.noPageLoader === "true") return;
          showPageLoader();
        });

        window.addEventListener("pageshow", hidePageLoader);
        window.addEventListener("load", hidePageLoader);
      })();
    </script>
</body>
</html>
