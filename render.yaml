services:
  - type: web
    name: scheduloio-web
    env: docker
    dockerfilePath: ./projttgs/Dockerfile
    dockerContext: .
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: DJANGO_ENV
        value: production
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        fromDatabase:
          name: scheduloio-db
          property: connectionString

databases:
  - name: scheduloio-db
    plan: free
